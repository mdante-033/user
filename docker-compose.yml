services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file: .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      SESSION_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - app_logs:/var/www/html/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_DB: cherynes
      POSTGRES_USER: cherynes
      POSTGRES_PASSWORD: cherynes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cherynes -d cherynes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  app_logs: